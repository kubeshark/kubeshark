suite: dissection storage configuration
templates:
  - templates/04-hub-deployment.yaml
tests:
  - it: should render dissector-storage-size arg with default values
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-storage-size
      - contains:
          path: spec.template.spec.containers[0].command
          content: "20Gi"

  - it: should not render dissector-storage-class arg with default values
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].command
          content: -dissector-storage-class

  - it: should render dissector-storage-size arg with custom value
    set:
      tap.delayedDissection.storageSize: 100Gi
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-storage-size
      - contains:
          path: spec.template.spec.containers[0].command
          content: "100Gi"

  - it: should render dissector-storage-class arg when set
    set:
      tap.delayedDissection.storageClass: gp3
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-storage-class
      - contains:
          path: spec.template.spec.containers[0].command
          content: gp3

  - it: should render both storage-size and storage-class when both set
    set:
      tap.delayedDissection.storageSize: 50Gi
      tap.delayedDissection.storageClass: io2
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-storage-size
      - contains:
          path: spec.template.spec.containers[0].command
          content: "50Gi"
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-storage-class
      - contains:
          path: spec.template.spec.containers[0].command
          content: io2

  - it: should not render dissector-storage-size arg when explicitly empty
    set:
      tap.delayedDissection.storageSize: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].command
          content: -dissector-storage-size

  - it: should not render dissector-storage-class arg when explicitly empty
    set:
      tap.delayedDissection.storageClass: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].command
          content: -dissector-storage-class

  - it: should still render existing dissector-cpu and dissector-memory args
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-cpu
      - contains:
          path: spec.template.spec.containers[0].command
          content: "1"
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-memory
      - contains:
          path: spec.template.spec.containers[0].command
          content: 4Gi

  - it: should render all dissector args together with custom values
    set:
      tap.delayedDissection.cpu: "4"
      tap.delayedDissection.memory: 8Gi
      tap.delayedDissection.storageSize: 200Gi
      tap.delayedDissection.storageClass: local-path
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-cpu
      - contains:
          path: spec.template.spec.containers[0].command
          content: "4"
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-memory
      - contains:
          path: spec.template.spec.containers[0].command
          content: 8Gi
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-storage-size
      - contains:
          path: spec.template.spec.containers[0].command
          content: "200Gi"
      - contains:
          path: spec.template.spec.containers[0].command
          content: -dissector-storage-class
      - contains:
          path: spec.template.spec.containers[0].command
          content: local-path
